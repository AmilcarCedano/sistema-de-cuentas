version: '3.8'

services:
  sistemacuentas-mysql:
    image: mysql:8.0
    container_name: sistemacuentas-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: SistemaCuentas2026Secure
      MYSQL_DATABASE: sistema_cuentas
    volumes:
      - sistemacuentas_db_data:/var/lib/mysql
    networks:
      - sistemacuentas_net

  sistemacuentas-backend:
    build:
      context: ./server
    container_name: sistemacuentas-backend
    restart: always
    environment:
      - DATABASE_URL=mysql://root:SistemaCuentas2026Secure@sistemacuentas-mysql:3306/sistema_cuentas
      - PORT=3001
      - NODE_ENV=production
    depends_on:
      - sistemacuentas-mysql
    networks:
      - sistemacuentas_net

  sistemacuentas-frontend:
    build:
      context: ./web
    container_name: sistemacuentas-frontend
    restart: always
    depends_on:
      - sistemacuentas-backend
    networks:
      - sistemacuentas_net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.siscuentas-web.rule=Host(`sistema-anderson.duckdns.org`)"
      - "traefik.http.routers.siscuentas-web.entrypoints=websecure"
      - "traefik.http.routers.siscuentas-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.siscuentas-web.loadbalancer.server.port=80"

volumes:
  sistemacuentas_db_data:

networks:
  sistemacuentas_net:
    driver: bridge
  dokploy-network:
    external: true
